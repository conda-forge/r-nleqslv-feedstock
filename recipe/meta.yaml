{% set version = "3.3.6" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-nleqslv
  version: {{ version|replace("-", "_") }}

source:
  fn: nleqslv_{{ version }}.tar.gz
  url:
    - {{ cran_mirror }}/src/contrib/nleqslv_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/nleqslv/nleqslv_{{ version }}.tar.gz
  sha256: e20dc3928c2516fdca8d8c66cf666846ef9fed485fafe440f28ec49193b27894

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  build:
    - {{ compiler('c') }}        # [not win]
    - {{ stdlib("c") }}          # [not win]
    - {{ compiler('fortran') }}  # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ stdlib("m2w64_c") }}          # [win]
    - {{ compiler('m2w64_fortran') }}        # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
  run:
    - r-base

test:
  commands:
    - $R -e "library('nleqslv')"           # [not win]
    - "\"%R%\" -e \"library('nleqslv')\""  # [win]

about:
  home: https://CRAN.R-project.org/package=nleqslv
  license: GPL-2.0-or-later
  summary: Solve a system of nonlinear equations using a Broyden or a Newton method with a choice of global strategies such as line search and trust region. There are options for using a numerical or user supplied Jacobian, for specifying a banded numerical Jacobian and for allowing a singular or ill-conditioned 
    Jacobian.
  license_file: {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3

extra:
  recipe-maintainers:
    - conda-forge/r
